name: Update UNESCO Data

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "UNESCO source URL"
        required: false
        default: "https://data.unesco.org/api/explore/v2.1/catalog/datasets/whc001/exports/json"
      retry_interval_days:
        description: "Retry interval days for extract status"
        required: false
        default: "30"
  schedule:
    - cron: "17 3 1 * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: windows-latest
    env:
      SOURCE_URL: ${{ github.event.inputs.source_url || vars.UNESCO_SOURCE_URL || 'https://data.unesco.org/api/explore/v2.1/catalog/datasets/whc001/exports/json' }}
      RETRY_DAYS: ${{ github.event.inputs.retry_interval_days || '30' }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch UNESCO official dataset
        id: fetch
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/fetch_unesco_official.ps1 `
            -SourceUrl "${{ env.SOURCE_URL }}" `
            -RawOutputFile "data/staging/unesco_source_raw.txt"

      - name: Convert staged UNESCO source
        id: convert
        if: steps.fetch.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/convert_unesco_source.ps1 `
            -InputFile "data/staging/unesco_source_raw.txt" `
            -SourceUrl "${{ env.SOURCE_URL }}" `
            -OutputFile "data/current/unesco_official_sites.geojson" `
            -OutputJsonFile "data/current/unesco_official_sites.json" `
            -RetryIntervalDays "${{ env.RETRY_DAYS }}" `
            -ArchiveDir "data/history" `
            -KeepVersions 24 `
            -OverwriteExisting

      - name: Update extract status on fetch failure
        id: status_update
        if: steps.fetch.outcome == 'failure'
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/update_extract_status.ps1 `
            -InputJsonFile "data/current/unesco_official_sites.json" `
            -RetryIntervalDays "${{ env.RETRY_DAYS }}" `
            -SourceUrl "${{ env.SOURCE_URL }}" `
            -ErrorMessage "CI fetch failed"

      - name: Validate UNESCO canonical JSON
        id: validate_json
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/validate_whs_dataset.ps1 `
            -InputFile "data/current/unesco_official_sites.json"

      - name: Validate derived UNESCO GeoJSON
        id: validate_geojson
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/validate_whs_dataset.ps1 `
            -InputFile "data/current/unesco_official_sites.geojson"

      - name: Evaluate pipeline result
        id: gate
        if: always()
        shell: pwsh
        run: |
          $softFailed = New-Object System.Collections.Generic.List[string]
          $hardFailed = New-Object System.Collections.Generic.List[string]

          if ("${{ steps.fetch.outcome }}" -eq "failure") { $softFailed.Add("fetch") }
          if ("${{ steps.convert.outcome }}" -eq "failure") { $hardFailed.Add("convert") }
          if ("${{ steps.status_update.outcome }}" -eq "failure") { $hardFailed.Add("status_update") }
          if ("${{ steps.validate_json.outcome }}" -eq "failure") { $hardFailed.Add("validate_json") }
          if ("${{ steps.validate_geojson.outcome }}" -eq "failure") { $hardFailed.Add("validate_geojson") }

          $allFailed = New-Object System.Collections.Generic.List[string]
          foreach ($s in $softFailed) { $allFailed.Add($s) }
          foreach ($h in $hardFailed) { $allFailed.Add($h) }

          $failed = ($allFailed.Count -gt 0)
          $commitAllowed = ($hardFailed.Count -eq 0)

          "failed=$($failed.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "commit_allowed=$($commitAllowed.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "failed_steps=$($allFailed -join ',')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "hard_failed_steps=$($hardFailed -join ',')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "soft_failed_steps=$($softFailed -join ',')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          if ($failed) {
            Write-Host "UNESCO refresh had failures: $($allFailed -join ', ')"
          } else {
            Write-Host "UNESCO refresh completed without failures."
          }

      - name: Commit changes
        if: steps.gate.outputs.commit_allowed == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current/unesco_official_sites.json data/current/unesco_official_sites.geojson data/history data/staging/unesco_source_raw.txt
          if (git diff --cached --quiet) {
            Write-Host "No changes to commit."
          } else {
            git commit -m "chore: refresh UNESCO official dataset"
            git push
          }

      - name: Evaluate alert configuration
        id: alert_gate
        if: steps.gate.outputs.failed == 'true'
        shell: pwsh
        env:
          ALERT_SMTP_SERVER: ${{ secrets.MWH_ALERT_SMTP_SERVER }}
          ALERT_SMTP_PORT: ${{ secrets.MWH_ALERT_SMTP_PORT }}
          ALERT_SMTP_USERNAME: ${{ secrets.MWH_ALERT_SMTP_USERNAME }}
          ALERT_SMTP_PASSWORD: ${{ secrets.MWH_ALERT_SMTP_PASSWORD }}
          ALERT_MAIL_TO: ${{ secrets.MWH_ALERT_MAIL_TO }}
          ALERT_MAIL_FROM: ${{ secrets.MWH_ALERT_MAIL_FROM }}
        run: |
          $required = @{
            ALERT_SMTP_SERVER = $env:ALERT_SMTP_SERVER
            ALERT_SMTP_PORT = $env:ALERT_SMTP_PORT
            ALERT_SMTP_USERNAME = $env:ALERT_SMTP_USERNAME
            ALERT_SMTP_PASSWORD = $env:ALERT_SMTP_PASSWORD
            ALERT_MAIL_TO = $env:ALERT_MAIL_TO
            ALERT_MAIL_FROM = $env:ALERT_MAIL_FROM
          }
          $missing = @($required.GetEnumerator() | Where-Object { [string]::IsNullOrWhiteSpace([string]$_.Value) } | ForEach-Object { $_.Key })
          $ready = ($missing.Count -eq 0)
          "smtp_ready=$($ready.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "missing=$($missing -join ',')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Warn when alert email secrets are missing
        if: steps.gate.outputs.failed == 'true' && steps.alert_gate.outputs.smtp_ready != 'true'
        shell: pwsh
        run: |
          Write-Warning "UNESCO refresh failed, but SMTP/mail secrets are not fully configured. No alert email sent."
          Write-Warning "Missing: ${{ steps.alert_gate.outputs.missing }}"
          Write-Warning "Required secrets: MWH_ALERT_SMTP_SERVER, MWH_ALERT_SMTP_PORT, MWH_ALERT_SMTP_USERNAME, MWH_ALERT_SMTP_PASSWORD, MWH_ALERT_MAIL_TO, MWH_ALERT_MAIL_FROM."

      - name: Send failure alert email
        if: steps.gate.outputs.failed == 'true' && steps.alert_gate.outputs.smtp_ready == 'true'
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: ${{ secrets.MWH_ALERT_SMTP_SERVER }}
          server_port: ${{ secrets.MWH_ALERT_SMTP_PORT }}
          username: ${{ secrets.MWH_ALERT_SMTP_USERNAME }}
          password: ${{ secrets.MWH_ALERT_SMTP_PASSWORD }}
          subject: "[My World Heritage] UNESCO refresh failure in ${{ github.repository }}"
          to: ${{ secrets.MWH_ALERT_MAIL_TO }}
          from: ${{ secrets.MWH_ALERT_MAIL_FROM }}
          body: |
            UNESCO refresh failed for ${{ github.repository }}.

            Failed steps: ${{ steps.gate.outputs.failed_steps }}
            Hard failures: ${{ steps.gate.outputs.hard_failed_steps }}
            Soft failures: ${{ steps.gate.outputs.soft_failed_steps }}

            Trigger: ${{ github.event_name }}
            Source URL: ${{ env.SOURCE_URL }}
            Retry interval days: ${{ env.RETRY_DAYS }}
            Run URL: ${{ env.RUN_URL }}

            Please inspect the run logs and update converter/mapping as needed for source drift.

      - name: Fail job when refresh failed
        if: steps.gate.outputs.failed == 'true'
        shell: pwsh
        run: |
          throw "UNESCO refresh failed. Steps: ${{ steps.gate.outputs.failed_steps }}"
